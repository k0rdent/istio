{{- if .Values.isManagement }}
{{- $version := .Values.gateway.version | replace "." "-" }}
apiVersion: k0rdent.mirantis.com/v1beta1
kind: MultiClusterService
metadata:
  name: {{ .Chart.Name }}-gateway
spec:
  clusterSelector:
    matchLabels:
      k0rdent.mirantis.com/istio-gateway: "true"
  dependsOn:
    - {{ .Chart.Name }}-network
  serviceSpec:
    services:
      - name: istio-gateway
        namespace: {{ .Release.Namespace }}
        template: {{ .Chart.Name }}-gateway-{{ $version }}
        values: |
          networkGateway: {{ `{{ .Cluster.metadata.name }}` }}-network
          labels:
            istio: eastwestgateway

      {{- if .Values.gateway.resource }}
      - name: gateway-template
        namespace: {{ .Release.Namespace }}
        template: {{ .Chart.Name }}-propagation
        dependsOn:
          - name: istio-gateway
            namespace: {{ .Release.Namespace }}
        values: |
          propagation:
            enabled: true
            data: |
{{- $gatewayResource := .Values.gateway.resource }}
{{- $processedResource := deepCopy $gatewayResource }}
{{- if $processedResource.spec.servers }}
{{- range $serverIdx, $server := $processedResource.spec.servers }}
{{- if $server.hosts }}
{{- $processedHosts := list }}
{{- range $host := $server.hosts }}
{{- $processedHosts = append $processedHosts ($host | replace "{clusterName}" "{{ .Cluster.metadata.name }}") }}
{{- end }}
{{- $_ := set $server "hosts" $processedHosts }}
{{- end }}
{{- end }}
{{- end }}
{{ toYaml $processedResource | nindent 14 }}
      {{- end }}
{{- end }}
