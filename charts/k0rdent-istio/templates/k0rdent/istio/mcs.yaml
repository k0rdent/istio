{{- if .Values.isManagement }}
  {{- $global := .Values.global | default dict }}
  {{- $customRegistry := "" }}
  {{- if and $global.registry (ne $global.registry "docker.io") }}
    {{- $customRegistry = $global.registry }}
  {{- end }}
  {{- $version := .Chart.Version | replace "." "-" }}
apiVersion: k0rdent.mirantis.com/v1beta1
kind: MultiClusterService
metadata:
  name: {{ .Chart.Name }}-network
spec:
  clusterSelector:
    matchLabels:
      k0rdent.mirantis.com/istio-role: member
  dependsOn:
    - {{ .Chart.Name }}-cert-manager
  serviceSpec:
    services:
      - name: k0rdent-istio
        namespace: {{ .Release.Namespace }}
        template: {{ .Chart.Name }}-{{ $version }}
        values: |
          operator:
            enabled: false
          rootCA:
            enabled: false
          isManagement: false
          intermediateCA:
            certificate: false
            issuer: true
          global:
          {{- with $customRegistry }}
            hub: {{ . }}/istio
          {{- end }}
            multiCluster:
              clusterName: {{ `{{ .Cluster.metadata.name }}` }}
            network: {{ `{{ .Cluster.metadata.name }}` }}-network
          cert-manager-service-template:
            enabled: false
          cert-manager-istio-csr:
          {{- with $customRegistry }}
            image:
              repository: {{ . }}/jetstack/cert-manager-istio-csr
          {{- end }}
            app:
              certmanager:
                issuer:
                  name: istio-ca-issuer-{{ `{{ printf "%s-%s" .Cluster.metadata.namespace .Cluster.metadata.name | adler32sum }}` }}
              server:
                clusterID: {{ `{{ .Cluster.metadata.name }}` }}
{{- end }}
